<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>GamePad</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Rajdhani:wght@500;700&display=swap');

  :root {
    --bg: #0a0a0c;
    --panel: #111116;
    --border: #1e1e28;
    --btn: #161620;
    --btn-active: #1a1a2e;
    --accent: #00e5ff;
    --accent2: #7c3aed;
    --warn: #ff4444;
    --text: #c8c8d8;
    --dim: #444458;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; user-select: none; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Rajdhani', sans-serif;
    min-height: 100dvh;
    display: flex;
    flex-direction: column;
    overflow: hidden;
    touch-action: none;
  }

  /* Header */
  .hdr {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 10px 16px 8px;
    border-bottom: 1px solid var(--border);
    background: var(--panel);
  }
  .hdr-title {
    font-family: 'Share Tech Mono', monospace;
    font-size: 13px;
    color: var(--accent);
    letter-spacing: 2px;
  }
  .status-dot {
    width: 8px; height: 8px;
    border-radius: 50%;
    background: var(--warn);
    box-shadow: 0 0 8px var(--warn);
    transition: all .3s;
  }
  .status-dot.ok { background: #00ff88; box-shadow: 0 0 8px #00ff88; }

  .ip-row {
    display: flex;
    gap: 6px;
    align-items: center;
    padding: 8px 16px;
    background: var(--panel);
    border-bottom: 1px solid var(--border);
  }
  .ip-input {
    flex: 1;
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 6px;
    color: var(--text);
    font-family: 'Share Tech Mono', monospace;
    font-size: 13px;
    padding: 6px 10px;
    outline: none;
  }
  .ip-input:focus { border-color: var(--accent); }
  .connect-btn {
    background: var(--accent2);
    color: #fff;
    border: none;
    border-radius: 6px;
    padding: 6px 14px;
    font-family: 'Rajdhani', sans-serif;
    font-weight: 700;
    font-size: 13px;
    letter-spacing: 1px;
    cursor: pointer;
    transition: opacity .15s;
  }
  .connect-btn:active { opacity: .7; }

  /* Main layout */
  .main {
    flex: 1;
    display: flex;
    flex-direction: column;
    justify-content: space-between;
    padding: 12px;
    gap: 10px;
    overflow: hidden;
  }

  /* Quick action bar */
  .quick-bar {
    display: flex;
    gap: 8px;
    justify-content: center;
  }

  /* Controls row */
  .controls-row {
    display: flex;
    justify-content: space-between;
    align-items: flex-end;
    gap: 10px;
  }

  /* WASD cluster */
  .wasd {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    grid-template-rows: repeat(2, 1fr);
    gap: 6px;
    width: 175px;
  }
  .wasd .btn-w { grid-column: 2; }
  .wasd .btn-a { grid-column: 1; }
  .wasd .btn-s { grid-column: 2; }
  .wasd .btn-d { grid-column: 3; grid-row: 2; }

  /* Right cluster */
  .right-cluster {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    grid-template-rows: repeat(2, 1fr);
    gap: 6px;
    width: 175px;
  }

  /* Base button */
  .btn {
    display: flex;
    align-items: center;
    justify-content: center;
    height: 60px;
    border-radius: 10px;
    border: 1px solid var(--border);
    background: var(--btn);
    font-family: 'Rajdhani', sans-serif;
    font-weight: 700;
    font-size: 16px;
    letter-spacing: 1px;
    color: var(--dim);
    cursor: pointer;
    transition: color .1s, border-color .1s, background .1s;
    position: relative;
    overflow: hidden;
    -webkit-touch-callout: none;
  }

  .btn::after {
    content: '';
    position: absolute;
    inset: 0;
    background: var(--accent);
    opacity: 0;
    transition: opacity .1s;
  }

  .btn.pressed {
    background: var(--btn-active);
    border-color: var(--accent);
    color: var(--accent);
    box-shadow: 0 0 12px rgba(0, 229, 255, 0.2), inset 0 0 8px rgba(0, 229, 255, 0.05);
  }
  .btn.pressed::after { opacity: 0.05; }

  .btn.btn-accent {
    border-color: #2a1a4a;
    color: #7c3aed88;
  }
  .btn.btn-accent.pressed {
    border-color: var(--accent2);
    color: var(--accent2);
    box-shadow: 0 0 12px rgba(124, 58, 237, 0.3);
  }

  .btn.btn-danger {
    border-color: #2a1010;
    color: #ff444466;
  }
  .btn.btn-danger.pressed {
    border-color: var(--warn);
    color: var(--warn);
    box-shadow: 0 0 12px rgba(255, 68, 68, 0.3);
  }

  .btn-sm {
    height: 42px;
    font-size: 12px;
    border-radius: 8px;
    flex: 1;
    letter-spacing: 0.5px;
  }

  /* Touchpad */
  .touchpad-wrap {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 6px;
  }
  .touchpad-label {
    font-family: 'Share Tech Mono', monospace;
    font-size: 10px;
    color: var(--dim);
    letter-spacing: 2px;
  }
  .touchpad {
    width: 100%;
    flex: 1;
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 14px;
    position: relative;
    overflow: hidden;
  }
  .touchpad-inner {
    position: absolute;
    inset: 0;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .touchpad-cross {
    opacity: 0.07;
  }
  .touchpad-ripple {
    position: absolute;
    width: 40px; height: 40px;
    border-radius: 50%;
    border: 1px solid var(--accent);
    opacity: 0;
    transform: translate(-50%, -50%) scale(0.5);
    pointer-events: none;
    transition: opacity .05s;
  }
  .touchpad-ripple.show {
    opacity: 0.6;
    transform: translate(-50%, -50%) scale(1);
  }

  /* LMB / RMB */
  .mouse-btns {
    display: flex;
    gap: 4px;
    height: 44px;
  }
  .mbtn {
    flex: 1;
    display: flex;
    align-items: center;
    justify-content: center;
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 8px;
    font-size: 11px;
    font-family: 'Share Tech Mono', monospace;
    color: var(--dim);
    cursor: pointer;
    transition: all .1s;
  }
  .mbtn.pressed {
    background: rgba(0,229,255,0.08);
    border-color: var(--accent);
    color: var(--accent);
  }

  /* Sensitivity control */
  .sens-row {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 6px 16px;
    border-top: 1px solid var(--border);
    background: var(--panel);
  }
  .sens-label {
    font-family: 'Share Tech Mono', monospace;
    font-size: 10px;
    color: var(--dim);
    letter-spacing: 1px;
    white-space: nowrap;
  }
  input[type=range] {
    flex: 1;
    -webkit-appearance: none;
    height: 2px;
    background: var(--border);
    border-radius: 2px;
    outline: none;
  }
  input[type=range]::-webkit-slider-thumb {
    -webkit-appearance: none;
    width: 16px; height: 16px;
    border-radius: 50%;
    background: var(--accent);
    box-shadow: 0 0 8px rgba(0,229,255,0.5);
  }
</style>
</head>
<body>

<div class="hdr">
  <span class="hdr-title">// GAMEPAD</span>
  <div style="display:flex;align-items:center;gap:8px">
    <span id="status-txt" style="font-size:11px;color:var(--dim);font-family:'Share Tech Mono',monospace">OFFLINE</span>
    <div class="status-dot" id="dot"></div>
  </div>
</div>

<div class="ip-row">
  <input class="ip-input" id="ip" type="text" placeholder="192.168.1.XX" value="">
  <button class="connect-btn" onclick="connect()">CONNECT</button>
</div>

<div class="main">

  <!-- Quick bar: Esc, Tab, Shift, Space, E, R -->
  <div class="quick-bar">
    <button class="btn btn-sm btn-danger" data-key="esc">ESC</button>
    <button class="btn btn-sm" data-key="tab">TAB</button>
    <button class="btn btn-sm btn-accent" data-key="shift">SHIFT</button>
    <button class="btn btn-sm btn-accent" data-key="space">SPACE</button>
    <button class="btn btn-sm" data-key="e">E</button>
    <button class="btn btn-sm" data-key="r">R</button>
  </div>

  <!-- Main controls -->
  <div class="controls-row">

    <!-- WASD -->
    <div class="wasd">
      <button class="btn btn-w" data-key="w">W</button>
      <button class="btn btn-a" data-key="a">A</button>
      <button class="btn btn-s" data-key="s">S</button>
      <button class="btn btn-d" data-key="d">D</button>
    </div>

    <!-- Touchpad in middle -->
    <div class="touchpad-wrap">
      <span class="touchpad-label">MOUSE</span>
      <div class="touchpad" id="touchpad">
        <div class="touchpad-inner">
          <svg class="touchpad-cross" width="60" height="60" viewBox="0 0 60 60">
            <line x1="30" y1="0" x2="30" y2="60" stroke="#fff" stroke-width="1"/>
            <line x1="0" y1="30" x2="60" y2="30" stroke="#fff" stroke-width="1"/>
            <circle cx="30" cy="30" r="3" fill="#fff"/>
          </svg>
        </div>
        <div class="touchpad-ripple" id="ripple"></div>
      </div>
      <div class="mouse-btns">
        <div class="mbtn" id="lmb">LMB</div>
        <div class="mbtn" id="rmb">RMB</div>
      </div>
    </div>

    <!-- Right action cluster: F, G, Q, C, 1, 2 -->
    <div class="right-cluster">
      <button class="btn btn-accent" data-key="f">F</button>
      <button class="btn btn-accent" data-key="g">G</button>
      <button class="btn btn-accent" data-key="q">Q</button>
      <button class="btn" data-key="c">C</button>
      <button class="btn" data-key="1">1</button>
      <button class="btn" data-key="2">2</button>
    </div>

  </div>
</div>

<div class="sens-row">
  <span class="sens-label">SENS</span>
  <input type="range" id="sens" min="1" max="20" value="8">
  <span class="sens-label" id="sens-val">8</span>
</div>

<script>
let serverIP = localStorage.getItem('gp_ip') || '';
let sensitivity = 8;
let connected = false;
let touchStartX = 0, touchStartY = 0;
let lastTouchX = 0, lastTouchY = 0;
let mouseMoveBuffer = {dx: 0, dy: 0};
let sendInterval = null;

// Restore IP
const ipInput = document.getElementById('ip');
if (serverIP) ipInput.value = serverIP;

// Sensitivity
document.getElementById('sens').addEventListener('input', function() {
  sensitivity = parseInt(this.value);
  document.getElementById('sens-val').textContent = sensitivity;
});

function getURL() {
  const ip = ipInput.value.trim();
  return `http://${ip}:5000`;
}

async function connect() {
  try {
    const r = await fetch(getURL() + '/ping', {signal: AbortSignal.timeout(2000)});
    const d = await r.json();
    if (d.status === 'ok') {
      connected = true;
      serverIP = ipInput.value.trim();
      localStorage.setItem('gp_ip', serverIP);
      document.getElementById('dot').className = 'status-dot ok';
      document.getElementById('status-txt').textContent = 'ONLINE';
    }
  } catch(e) {
    document.getElementById('dot').className = 'status-dot';
    document.getElementById('status-txt').textContent = 'ERROR';
    setTimeout(() => document.getElementById('status-txt').textContent = 'OFFLINE', 2000);
  }
}

async function send(path, data) {
  if (!connected) return;
  try {
    await fetch(getURL() + path, {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify(data),
      signal: AbortSignal.timeout(500)
    });
  } catch(e) {}
}

// Key buttons
document.querySelectorAll('.btn[data-key]').forEach(btn => {
  const key = btn.dataset.key;

  // Touch events for hold
  btn.addEventListener('touchstart', (e) => {
    e.preventDefault();
    btn.classList.add('pressed');
    send('/key/down', {key});
  }, {passive: false});

  btn.addEventListener('touchend', (e) => {
    e.preventDefault();
    btn.classList.remove('pressed');
    send('/key/up', {key});
  }, {passive: false});

  btn.addEventListener('touchcancel', (e) => {
    btn.classList.remove('pressed');
    send('/key/up', {key});
  });
});

// Mouse buttons
function setupMouseBtn(id, button) {
  const el = document.getElementById(id);
  el.addEventListener('touchstart', (e) => {
    e.preventDefault();
    el.classList.add('pressed');
    send('/mouse/click', {button});
  }, {passive: false});
  el.addEventListener('touchend', (e) => {
    e.preventDefault();
    setTimeout(() => el.classList.remove('pressed'), 100);
  }, {passive: false});
}
setupMouseBtn('lmb', 'left');
setupMouseBtn('rmb', 'right');

// Touchpad mouse movement
const pad = document.getElementById('touchpad');
const ripple = document.getElementById('ripple');

// Buffer & send mouse moves at 30fps
sendInterval = setInterval(() => {
  if (mouseMoveBuffer.dx !== 0 || mouseMoveBuffer.dy !== 0) {
    send('/mouse/move', {dx: mouseMoveBuffer.dx, dy: mouseMoveBuffer.dy});
    mouseMoveBuffer = {dx: 0, dy: 0};
  }
}, 33);

pad.addEventListener('touchstart', (e) => {
  e.preventDefault();
  const t = e.touches[0];
  touchStartX = t.clientX;
  touchStartY = t.clientY;
  lastTouchX = t.clientX;
  lastTouchY = t.clientY;
  // Show ripple
  const rect = pad.getBoundingClientRect();
  ripple.style.left = (t.clientX - rect.left) + 'px';
  ripple.style.top = (t.clientY - rect.top) + 'px';
  ripple.classList.add('show');
}, {passive: false});

pad.addEventListener('touchmove', (e) => {
  e.preventDefault();
  const t = e.touches[0];
  const dx = Math.round((t.clientX - lastTouchX) * sensitivity * 0.5);
  const dy = Math.round((t.clientY - lastTouchY) * sensitivity * 0.5);
  mouseMoveBuffer.dx += dx;
  mouseMoveBuffer.dy += dy;
  lastTouchX = t.clientX;
  lastTouchY = t.clientY;
  // Move ripple
  const rect = pad.getBoundingClientRect();
  ripple.style.left = (t.clientX - rect.left) + 'px';
  ripple.style.top = (t.clientY - rect.top) + 'px';
}, {passive: false});

pad.addEventListener('touchend', (e) => {
  e.preventDefault();
  ripple.classList.remove('show');
}, {passive: false});

// Release all on page hide
document.addEventListener('visibilitychange', () => {
  if (document.hidden) send('/release_all', {});
});

// Auto-connect if IP saved
if (serverIP) setTimeout(connect, 500);
</script>
</body>
</html>
